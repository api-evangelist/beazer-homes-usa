  - type: Features
    data:
      - name: Choice Plans
        description: >-
          Customizable floorplan program letting buyers reconfigure rooms
          (e.g., add a bedroom, extend the great room) on a fixed plan
          template before construction.
      - name: Mortgage Choice
        description: >-
          Competitive lender program that surfaces multiple mortgage offers
          so buyers can comparison-shop financing rather than being routed
          to a single preferred lender.
      - name: Style Choice
        description: >-
          Design studio program for personalizing interior finishes,
          fixtures, flooring, and cabinetry.
      - name: Livable Features
        description: >-
          Accessibility-oriented design options (wider doorways, lever
          handles, accessible heights) intended to support aging-in-place
          and multi-generational living.
      - name: Energy Efficient Construction
        description: >-
          All Beazer homes are built to a HERS-rated efficiency target
          marketed as 44% better than the average HERS-rated new home,
          with whole-house ERV ventilation and enhanced air sealing.
      - name: Indoor Air Quality
        description: >-
          Whole-house Energy Recovery Ventilator (ERV) installed in 100%
          of Beazer homes for continuous fresh-air exchange.
      - name: Enhanced Insulation
        description: >-
          Exterior wall assemblies up to 50% thicker than standard
          construction for improved thermal and acoustic performance.
      - name: Warranty Program
        description: >-
          One-, two-, and ten-year limited warranty coverage on every
          Beazer-built home.
  - type: UseCases
    data:
      - name: New Construction Home Purchase
        description: >-
          Consumer buys a new single-family or attached home in an active
          Beazer community, with selectable plan and finishes.
      - name: First-Time Homebuyer
        description: >-
          Entry-level price-band communities marketed with affordability,
          warranty, and mortgage-shopping support.
      - name: Move-Up Buyer
        description: >-
          Larger Choice Plans and upgraded Style Choice packages targeted
          at families upgrading from a starter home.
      - name: Active Adult / Age-Targeted
        description: >-
          Livable Features and single-story plans positioned at empty-
          nester and active-adult buyers.
      - name: Build-to-Order Personalization
        description: >-
          Buyer selects a plan, Choice Plan structural option, and Style
          Choice finishes during the pre-construction period.
  - type: Integrations
    data:
      - name: Multiple Listing Service (MLS)
        description: >-
          Beazer communities and quick move-in inventory are syndicated to
          MLS, Zillow, Realtor.com, and broker portals.
      - name: Realtor Partner Program
        description: >-
          Co-broke program with licensed real-estate agents for buyer
          representation.
      - name: Mortgage Choice Lender Network
        description: >-
          Network of preferred mortgage lenders that compete on rate and
          fees for Beazer buyers.
      - name: TrustBuilder Surveys
        description: >-
          Third-party customer-experience measurement program cited by
          Beazer for its customer-experience ranking.
  - type: Solutions
    data:
      - name: Choice Plans Homes
        description: Production plans with structural Choice Plan options.
      - name: Gatherings (Active Adult)
        description: >-
          Beazer's age-targeted attached-home community concept for
          downsizing buyers.
      - name: Quick Move-In Inventory
        description: >-
          Completed or near-completed homes available for accelerated
          closing.
