name: Beazer Homes USA
description: >-
  Beazer Homes USA, Inc. (NYSE: BZH) is an Atlanta, Georgia-headquartered
  national homebuilder founded in 1985 and publicly listed since 1994. The
  company designs, sells, and builds single-family and multi-family homes across
  approximately thirteen U.S. states under brand differentiators such as
  Choice Plans (customizable floorplans), Mortgage Choice (competitive lender
  program), Style Choice (interior personalization), and Livable Features
  (accessibility options). Beazer markets itself as "America's #1
  Energy-Efficient Homebuilder," citing homes that are 44% more efficient than
  the average HERS-rated new home and shipping whole-house ERV ventilation in
  100% of homes. As of the most recent public data point (FY2016 10-K), Beazer
  reported revenue of $1.822B, delivered 5,419 homes, operated 161 active
  communities, and employed approximately 1,100 people. The company has no
  public developer program or external APIs; its digital surface is a
  consumer-facing marketing/community-finder website plus an investor
  relations portal.
